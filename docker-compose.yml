services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - uploads_data:/app/public/uploads
    # We override JWT_SECRET here to escape the $ for docker-compose interpolation
    # This prevents the "Rcr variable not set" warning while keeping .env compatible with Next.js
    environment:
      DATABASE_URL: mysql://root:root@db:3306/compro-datamedika
      JWT_SECRET: "h&i_h980-3P+??mM_+AH$$Rcr%Ry+W+,mCdc_Xeh#bY(QGRH1;.JY}5AyZ2$$!zHfGKd}ZpwV,}BqN_;5g&+w:{1Fy;Lt5Y9jPGy(-&-1A#-@WbPjXd;WvCSRjp.cXjK(t-,JP{+CtuH?4dVB8g%79ke,U#B{QwqvjE:TND3pDWm-S_SU6ga{f%wyz%!3%)HH.D:A.z,T[GR{qw*h"

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: compro-datamedika
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  uploads_data:
