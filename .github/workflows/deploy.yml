name: Web Compro
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/compro-datamedika:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=mysql://root:root@localhost:3306/dummy

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/developer/compro-datamedika || mkdir -p /home/developer/compro-datamedika && cd /home/developer/compro-datamedika
            
            # Buat file .env secara aman dengan mengganti $ menjadi $$ untuk docker-compose
            # Quoted 'EOF' memastikan shell tidak melakukan ekspansi pada isi file
            cat <<'EOF' > .env.prod
            DATABASE_URL=${{ replace(secrets.DATABASE_URL, '$', '$$') }}
            JWT_SECRET=${{ replace(secrets.JWT_SECRET, '$', '$$') }}
            DB_ROOT_PASSWORD=${{ replace(secrets.DB_ROOT_PASSWORD, '$', '$$') }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ replace(secrets.DB_PASSWORD, '$', '$$') }}
            EOF

            cat <<'EOF' > docker-compose.yml
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/compro-datamedika:latest
                ports:
                  - "3000:3000"
                restart: always
                env_file:
                  - .env.prod
                depends_on:
                  db:
                    condition: service_healthy
              db:
                image: mysql:8
                restart: always
                environment:
                  MYSQL_ROOT_PASSWORD: "${{ secrets.DB_ROOT_PASSWORD }}"
                  MYSQL_USER: "${{ secrets.DB_USER }}"
                  MYSQL_PASSWORD: "${{ secrets.DB_PASSWORD }}"
                  MYSQL_DATABASE: compro_datamedika
                volumes:
                  - mysql_data:/var/lib/mysql
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
            volumes:
              mysql_data:
            EOF

            # Cek apakah butuh sudo untuk menjalankan docker
            if ! docker ps > /dev/null 2>&1; then
              CMD_PREFIX="sudo"
            else
              CMD_PREFIX=""
            fi

            $CMD_PREFIX docker compose pull
            $CMD_PREFIX docker compose down
            $CMD_PREFIX docker compose up -d
            $CMD_PREFIX docker image prune -f
