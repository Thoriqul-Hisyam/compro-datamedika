name: Web Compro
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/compro-datamedika:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=mysql://root:root@localhost:3306/dummy

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/developer/compro-datamedika || mkdir -p /home/developer/compro-datamedika && cd /home/developer/compro-datamedika
            
            # Quoted 'EOF' mencegah bash mencoba memproses karakter $ di password
            cat <<'EOF' > docker-compose.yml
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/compro-datamedika:latest
                ports:
                  - "3000:3000"
                restart: always
                environment:
                  DATABASE_URL: "${{ secrets.DATABASE_URL }}"
                  JWT_SECRET: "${{ secrets.JWT_SECRET }}"
                depends_on:
                  db:
                    condition: service_healthy
              db:
                image: mysql:8
                restart: always
                environment:
                  MYSQL_ROOT_PASSWORD: root
                  MYSQL_DATABASE: compro-datamedika
                volumes:
                  - mysql_data:/var/lib/mysql
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
            volumes:
              mysql_data:
            EOF

            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f
